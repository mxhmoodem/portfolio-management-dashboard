services:
  - type: web
    name: trading-app
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

databases:
  - name: trading-db
    databaseName: trading_app
    user: trading_user
    plan: free
    region: ohio
